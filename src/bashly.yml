name: srcset
help: create srcset images for use with img elements
version: 0.1.0

variables:
  - name: IMG_TYPE
    value: "*.jpg"

dependencies:
  imagemagick:
    command: [magick]
    help: run 'brew insall imagemagick' on macos or 'sudo apt install imagemagick' on linux

flags:
  - long: --input
    short: -i
    arg: image
    help: Path to image file
    default: "."

  - long: --png
    short: -p
    help: Generate srcset images for png instead of jpg

  - long: --large
    short: -l
    help: Generate srcset images for large images

examples:
  - websizer -i=image.jpg -o=/website/images
  - websizer -l -i=images/ -o=/website/images
