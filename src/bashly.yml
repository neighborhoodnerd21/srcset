name: srcset
help: create srcset images for use with img elements
version: 0.1.0

variables:
  - name: IMG_TYPE
    value: "*.jpg"
  - name: IMG_PTH
    value: ["./"]
  - name: SIZES
    value: ["150", "300", "600", "1000"]
  - name: LG_SIZES
    value: ["150", "300", "600", "1000", "1200", "1500", "2000"]

dependencies:
  imagemagick:
    command: [magick]
    help: run 'brew insall imagemagick' on macos or 'sudo apt install imagemagick' on linux

args:
  - name: input
    help: Path to image file or directory containing images
    default: "."

flags:
  - long: --png
    short: -p
    help: Generate srcset images for png instead of jpg

  - long: --large
    short: -l
    help: Generate srcset images for large images

examples:
  - websizer -i=image.jpg -o=/website/images
  - websizer -l -i=images/ -o=/website/images
